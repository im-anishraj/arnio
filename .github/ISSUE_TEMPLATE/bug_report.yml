name: Bug Report
description: Create a report to help us improve arnio
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please ensure you are running the latest version of `arnio` before reporting.
  - type: input
    id: version
    attributes:
      label: Arnio Version
      description: Run `python -c "import arnio; print(arnio.__version__)"` and paste the output.
      placeholder: "e.g., 0.1.3"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Code to Reproduce
      description: Please provide a minimal, runnable code snippet that reproduces the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
