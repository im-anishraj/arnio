name: 🐛 Bug Report
description: Report a bug, parser failure, or performance regression in Arnio
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please provide as much detail as possible so we can reproduce and fix it.
  - type: input
    id: version
    attributes:
      label: Arnio Version
      description: What version of Arnio are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running on? (e.g., Windows 11, Ubuntu 22.04, macOS Sonoma)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimum Reproducible Example
      description: Please provide a short code snippet and a sample of the CSV that causes the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Logs or Tracebacks
      description: Paste any relevant error messages here.
      render: bash
