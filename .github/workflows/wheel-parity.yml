# .github/workflows/wheel-parity.yml
#
# Wheel artifact parity check
# ============================
# Builds the arnio wheel from source, installs it into a clean virtual
# environment, then verifies that:
#
#   - Every runtime .py file under arnio/ in the source tree is present
#     in the installed wheel (explicit exclude-allowlist in
#     scripts/check_wheel_parity.py controls intentional omissions).
#   - All required modules are importable:
#       arnio, arnio.cli, arnio._version,
#       arnio.integrations, arnio.integrations.polars,
#       arnio.integrations.pandas, arnio.integrations.duckdb,
#       arnio.integrations.sklearn
#   - arnio.__all__ and arnio.integrations.__all__ contain their
#     expected public symbols.
#
# The job fails if any check is violated, blocking merges that would
# ship a wheel out of sync with the source package.

name: Wheel Parity Check

on:
  push:
    branches: ["main", "release/**"]
    paths:
      - "arnio/**"
      - "pyproject.toml"
      - "setup.py"
      - "CMakeLists.txt"
      - "scripts/check_wheel_parity.py"
      - ".github/workflows/wheel-parity.yml"

  pull_request:
    branches: ["main", "release/**"]
    paths:
      - "arnio/**"
      - "pyproject.toml"
      - "setup.py"
      - "CMakeLists.txt"
      - "scripts/check_wheel_parity.py"
      - ".github/workflows/wheel-parity.yml"

  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wheel-parity:
    name: "Parity check – ${{ matrix.os }} / Python ${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ libpython3-dev pybind11-dev

      - name: Install system build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pybind11

      - name: Install Python build tooling
        run: python -m pip install --upgrade pip build wheel "scikit-build-core>=0.8" pybind11

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Run wheel parity check
        id: parity
        run: python scripts/check_wheel_parity.py dist/

      - name: Upload wheel artefact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arnio-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 7
          if-no-files-found: warn

      - name: Annotate failure
        if: failure() && steps.parity.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.setFailed(
              "Wheel parity check failed on ${{ matrix.os }} / Python ${{ matrix.python-version }}. " +
              "Check the 'Run wheel parity check' step above for details. " +
              "Common causes: a new .py file was added to arnio/ but is not " +
              "included in the wheel (check pyproject.toml [tool.scikit-build]), " +
              "or an __all__ export was not updated."
            );