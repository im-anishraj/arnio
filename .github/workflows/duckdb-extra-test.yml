name: DuckDB Extra Tests

# Runs the DuckDB integration test module with duckdb installed.
# Triggered on changes to the DuckDB integration surface or this workflow,
# plus a weekly schedule and manual dispatch.

on:
  pull_request:
    paths:
      - ".github/workflows/duckdb-extra-test.yml"
      - "arnio/integrations/duckdb.py"
      - "tests/test_integrations_duckdb.py"
      - "pyproject.toml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  duckdb-extra-test:
    name: DuckDB integration tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install arnio with DuckDB support
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"
          pip install duckdb

      - name: Run DuckDB integration tests
        run: pytest tests/test_integrations_duckdb.py -v --tb=short