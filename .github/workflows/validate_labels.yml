name: Validate Labels

on:
  pull_request:
    paths:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/labels.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      - run: python .github/scripts/validate_labels.py