name: Arrow Extra Tests

# Runs the to_arrow() conversion test suite with pyarrow installed.
# Triggered on changes to the Arrow conversion code or this workflow,
# plus a weekly schedule and manual dispatch.

on:
  pull_request:
    paths:
      - ".github/workflows/arrow-extra-test.yml"
      - "cpp/**"
      - "bindings/**"
      - "arnio/_core.py"
      - "arnio/_arnio_cpp.pyi"
      - "arnio/convert.py"
      - "tests/test_to_arrow_edge_cases.py"
      - "tests/test_convert.py"
      - "pyproject.toml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  arrow-extra-test:
    name: to_arrow() with pyarrow (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install arnio with arrow extra
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,arrow]"

      - name: Run Arrow conversion tests
        run: pytest tests/test_to_arrow_edge_cases.py tests/test_convert.py::TestToArrow -v --tb=short
