name: Arrow Extra Tests

# Runs Arrow conversion tests with pyarrow installed.
# Triggered on changes to Arrow-related code and on a weekly schedule.

on:
  pull_request:
    paths:
      - ".github/workflows/arrow-extra-test.yml"
      - "arnio/io.py"
      - "tests/test_convert.py"
      - "tests/test_to_arrow_edge_cases.py"
      - "pyproject.toml"
  schedule:
    - cron: "0 6 * * 2"  # Every Tuesday at 06:00 UTC
  workflow_dispatch:

jobs:
  arrow-extra-test:
    name: Arrow conversion tests with pyarrow (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install arnio with arrow extra
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,arrow]"

      - name: Run Arrow conversion tests
        run: |
          pytest tests/test_to_arrow_edge_cases.py tests/test_convert.py -q
