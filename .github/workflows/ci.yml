name: CI

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/ci.yml"
      - "arnio/**"
      - "bindings/**"
      - "cpp/**"
      - "tests/**"
      - "examples/**"
      - "scripts/**"
      - "pyproject.toml"
      - "setup.py"
      - "mypy.ini"
      - "CMakeLists.txt"
      - ".pre-commit-config.yaml"

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

  lint:
    name: Lint (Black, Ruff, clang-format)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install lint dependencies
        run: pip install "black>=24.0" "ruff>=0.4.0" "mypy>=1.0,<2.0" "numpy<2.5" pandas-stubs types-PyYAML types-setuptools

      - name: Documentation UTF-8 check
        run: python scripts/check_docs_utf8.py

      - name: Black (check-only)
        run: black --check --diff .

      - name: Ruff (check-only)
        run: ruff check . --extend-exclude "*.ipynb"

      - name: mypy (check-only)
        run: mypy --config-file mypy.ini

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-17

      - name: clang-format (check-only)
        run: |
          find cpp/ bindings/ -type f \( -name '*.cpp' -o -name '*.h' \) \
            | xargs clang-format-17 --dry-run --Werror

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Prettier (check-only)
        run: npm run format:check


  cpp_tests:
    name: C++ Native Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Upgrade pip and setuptools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies and arnio
        run: |
          pip install -e .[dev]

      - name: Run pytest with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v \
            --cov=arnio \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  notebook_smoke:
    name: Notebook Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[dev]
          pip install jupyter nbconvert ipykernel

      - name: Execute notebooks
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=300 \
            examples/financial_csv_example.ipynb \
            --output financial_csv_example.executed.ipynb
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=300 \
            examples/ignite_arnio_cleaning.ipynb \
            --output ignite_arnio_cleaning.executed.ipynb

  sklearn_integration:
    name: scikit-learn Integration Tests
    needs: build_and_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dev + sklearn extras
        run: pip install -e ".[dev,sklearn]"

      - name: Run sklearn integration tests
        run: pytest tests/test_sklearn.py -v --cov=arnio --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
