name: Website Smoke

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "scripts/check_website.py"
      - ".github/workflows/website-smoke.yml"
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - "scripts/check_website.py"
      - ".github/workflows/website-smoke.yml"

jobs:
  website-smoke:
    name: Static website smoke check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Check local links, fragments, and required assets
        run: python scripts/check_website.py
