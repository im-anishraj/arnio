name: Build & Publish Wheels

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag or ref to build and publish"
        required: false
        type: string

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}
      - name: Build sdist
        run: pipx run build --sdist
      - name: Install package from sdist
        run: pip install dist/*.tar.gz
      - name: Smoke test import
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys
          import tempfile

          with tempfile.TemporaryDirectory() as tmp:
              subprocess.run(
                  [sys.executable, "-c", "import arnio"],
                  cwd=tmp,
                  check=True,
                  env={**os.environ, "PYTHONPATH": ""},
              )
          PY
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2
        env:
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_TEST_COMMAND: python -m pytest {project}/tests -v --tb=short

      - name: Set up Python for wheel smoke test
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Smoke test wheel install
        run: python tests/smoke_wheel_install.py --wheelhouse wheelhouse

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7
